<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to Markdown</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>PDF → MD</h1>
        <button id="upload-btn" class="btn btn-primary btn-sm">+ Upload</button>
        <input type="file" id="file-input" accept=".pdf,.docx,.doc,.pptx,.xlsx,.epub" multiple hidden />
      </div>
      <ul id="file-list"></ul>

      <!-- ENGINE SELECTOR -->
      <div id="engine-section">
        <div class="section-label">Conversion Engine</div>
        <select id="engine-select" class="engine-select">
          <option value="opendataloader">opendataloader-pdf</option>
          <option value="kreuzberg">kreuzberg</option>
        </select>
      </div>

      <div class="sidebar-footer">
        <button id="export-zip-btn" class="btn btn-accent btn-block" disabled>Export MD ZIP</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="main-content">
      <div id="empty-state">
        <div id="drop-zone">
          <div class="drop-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <polyline points="9 15 12 12 15 15"/>
            </svg>
          </div>
          <p class="drop-text">Drag & drop files here</p>
          <p class="drop-hint">or click "Upload" in the sidebar</p>
        </div>
      </div>

      <div id="editor-section" class="hidden">
        <div class="toolbar">
          <span id="filename" class="filename"></span>
          <div class="toolbar-actions">
            <button id="download-btn" class="btn btn-primary btn-sm">Download .md</button>
          </div>
        </div>
        <div id="split-pane">
          <div id="editor-pane">
            <div class="pane-header">Markdown</div>
            <textarea id="editor" spellcheck="false"></textarea>
          </div>
          <div class="divider"></div>
          <div id="preview-pane">
            <div class="pane-header">Preview</div>
            <div id="preview"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Confirm Dialog -->
  <div id="confirm-dialog" class="modal hidden">
    <div class="modal-content">
      <p id="confirm-message">You have unsaved changes. What would you like to do?</p>
      <div class="modal-actions">
        <button id="confirm-save" class="btn btn-primary">Save</button>
        <button id="confirm-discard" class="btn btn-secondary">Discard</button>
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="modal hidden">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p id="loading-text">Generating PDF...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
