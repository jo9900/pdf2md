<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to Markdown</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
</head>
<body>
  <header>
    <h1>PDF to Markdown</h1>
    <p class="subtitle">Convert PDF documents to editable Markdown</p>
  </header>

  <main>
    <section id="upload-section">
      <div id="drop-zone">
        <div class="drop-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
          </svg>
        </div>
        <p class="drop-text">Drag & drop your PDF here</p>
        <p class="drop-hint">or click to browse</p>
        <input type="file" id="file-input" accept=".pdf" hidden />
      </div>
      <div id="upload-status" class="hidden">
        <div class="spinner"></div>
        <p id="status-text">Converting...</p>
      </div>
      <div id="upload-error" class="hidden">
        <p id="error-text"></p>
        <button id="retry-btn">Try Again</button>
      </div>
    </section>

    <section id="editor-section" class="hidden">
      <div class="toolbar">
        <span id="filename" class="filename"></span>
        <div class="toolbar-actions">
          <button id="new-btn" class="btn btn-secondary">New File</button>
          <button id="download-btn" class="btn btn-primary">Download .md</button>
        </div>
      </div>
      <div id="split-pane">
        <div id="editor-pane">
          <div class="pane-header">Markdown</div>
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
        <div class="divider"></div>
        <div id="preview-pane">
          <div class="pane-header">Preview</div>
          <div id="preview"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const uploadSection = document.getElementById('upload-section');
    const uploadStatus = document.getElementById('upload-status');
    const statusText = document.getElementById('status-text');
    const uploadError = document.getElementById('upload-error');
    const errorText = document.getElementById('error-text');
    const retryBtn = document.getElementById('retry-btn');
    const editorSection = document.getElementById('editor-section');
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const filenameEl = document.getElementById('filename');
    const downloadBtn = document.getElementById('download-btn');
    const newBtn = document.getElementById('new-btn');

    let currentFilename = '';

    function renderPreview() {
      preview.innerHTML = marked.parse(editor.value);
    }

    editor.addEventListener('input', renderPreview);

    function showUpload() {
      editorSection.classList.add('hidden');
      uploadSection.classList.remove('hidden');
      uploadStatus.classList.add('hidden');
      uploadError.classList.add('hidden');
      dropZone.classList.remove('hidden');
    }

    function showEditor(md, filename) {
      currentFilename = filename.replace(/\.pdf$/i, '.md');
      filenameEl.textContent = currentFilename;
      uploadSection.classList.add('hidden');
      editorSection.classList.remove('hidden');
      editor.value = md;
      renderPreview();
    }

    async function uploadPdf(file) {
      dropZone.classList.add('hidden');
      uploadError.classList.add('hidden');
      uploadStatus.classList.remove('hidden');
      statusText.textContent = 'Converting ' + file.name + '...';

      const formData = new FormData();
      formData.append('pdf', file);

      try {
        const res = await fetch('/api/convert', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Conversion failed');
        showEditor(data.markdown, data.filename);
      } catch (err) {
        uploadStatus.classList.add('hidden');
        uploadError.classList.remove('hidden');
        errorText.textContent = err.message;
      }
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) uploadPdf(e.target.files[0]);
      fileInput.value = '';
    });
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        uploadPdf(file);
      } else {
        uploadError.classList.remove('hidden');
        errorText.textContent = 'Please drop a PDF file.';
        dropZone.classList.add('hidden');
      }
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentFilename;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    newBtn.addEventListener('click', showUpload);
    retryBtn.addEventListener('click', showUpload);
  </script>
</body>
</html>
